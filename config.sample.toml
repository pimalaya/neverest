################################################################################
#### Account configuration #####################################################
################################################################################

[accounts.example]

# The default account is used when `--account` is omitted on the
# command line.
default = true

# Mailbox-level sync settings. Filters apply symmetrically to both
# sides; aliases are friendly-name -> backend-id mappings.
#mailbox.filters = "all"
#mailbox.filters.exclude = ["All Mails"]
mailbox.filters.include = ["INBOX"]

#mailbox.alias.inbox = "INBOX"
#mailbox.alias.drafts = "Drafts"
#mailbox.alias.sent = "Sent"
#mailbox.alias.trash = "Trash"

# Envelope-level sync filters (placeholder; no fields are wired yet).
#envelope = {}

########################################
#### Left/right backend configuration ##
########################################
#
# There is no implicit direction from left to right; sides are
# equivalent labels. Each side declares exactly one of `imap`, `jmap`
# or `maildir`.

# ----- Left side: local Maildir -----

left.maildir.root = "~/.Mail/example"

# Per-side permissions. Defaults are all true; declare a subset to
# tighten what neverest is allowed to do.
#left.mailbox.create = true
#left.mailbox.delete = true
#left.flag.update = true
#left.message.create = true
#left.message.delete = true

# ----- Right side: IMAP -----

# Server address. Accepts a bare authority (treated as
# `imaps://<authority>`) or a full `imap://` / `imaps://` URL.
right.imap.server = "imap.example.com:993"

# Set `true` for cleartext + STARTTLS upgrade. Defaults to false
# (implicit TLS).
#right.imap.starttls = false

# Optional TLS knobs.
#right.imap.tls.provider = "rustls"
#right.imap.tls.rustls.crypto = "ring"
#right.imap.tls.cert = "/path/to/ca.pem"

# SASL credentials. Exactly one variant per `[*.sasl]` block.
right.imap.sasl.plain.authcid = "example@example.com"
right.imap.sasl.plain.passwd = { keyring = "example-right-imap" }
#right.imap.sasl.plain.passwd = { cmd = "pass show example-right-imap" }
#right.imap.sasl.plain.passwd = { raw = "p@ssw0rd" }

#right.imap.sasl.login = { username = "example", password = { cmd = "..." } }
#right.imap.sasl.anonymous = { message = "anonymous@example.com" }
#right.imap.sasl.oauthbearer = { username = "example", host = "imap.example.com", port = 993, token = { keyring = "example-oauth" } }
#right.imap.sasl.xoauth2 = { username = "example", token = { keyring = "example-oauth" } }
#right.imap.sasl.scram-sha-256 = { username = "example", password = { cmd = "..." } }

# Lock the right side down — keep it read-mostly for the IMAP server.
right.mailbox.create = false
right.mailbox.delete = false
right.message.delete = false

# ----- Right side: JMAP (alternative example) -----
#right.jmap.server = "fastmail.com"
#right.jmap.auth.bearer.token = { keyring = "example-jmap-bearer" }
#right.jmap.auth.basic.username = "example@fastmail.com"
#right.jmap.auth.basic.password = { keyring = "example-jmap-basic" }
